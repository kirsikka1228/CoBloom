server:
  port: 8080

spring:
  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 3MB
  datasource:
    url: jdbc:h2:file:./data/cobloom;MODE=MySQL;DATABASE_TO_LOWER=TRUE;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: false
      path: /h2-console

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

cobloom:
  jwt-secret: ${COBLOOM_JWT_SECRET}
  jwt-expire-hours: 168
  cors:
    allowed-origins: ${COBLOOM_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
  ai-provider: real
  llm:
    base-url: https://api.siliconflow.cn/v1
    api-key: ${COBLOOM_LLM_API_KEY:}
    model: deepseek-ai/DeepSeek-V4-Flash
    extraction-model: deepseek-ai/DeepSeek-V3.2
    connect-timeout-seconds: 10
    read-timeout-seconds: 300

logging:
  level:
    com.cobloom: INFO
    com.cobloom.mapper: WARN
    com.baomidou.mybatisplus: WARN
